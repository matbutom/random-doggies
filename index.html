<!--
  index.html — Doggo Prints layout, sidebar, canvas container
  version: MVP 0.1
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doggo Prints</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">
    <!-- LEFT SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-title">DOGGO<br>PRINTS</div>

      <div class="section">
        <div class="section-label">PERRITO</div>
        <button class="btn" id="btn-dogs">[ randomize ]</button>
        <div class="section-meta" id="meta-dogs">× 4 dogs</div>
      </div>

      <div class="section">
        <div class="section-label">FONDO</div>
        <button class="btn" id="btn-bg">[ randomize ]</button>
        <div class="section-meta" id="meta-bg">#F5E642 AMARILLO</div>
      </div>

      <div class="section">
        <div class="section-label">RELLENO</div>
        <button class="btn" id="btn-texture">[ randomize ]</button>
        <div class="section-meta" id="meta-texture">hatching 45°</div>
      </div>

      <div class="sidebar-bottom">
        <div class="format-toggle">
          <button class="toggle-btn active" id="btn-a4" data-format="A4">A4</button>
          <span class="toggle-sep">|</span>
          <button class="toggle-btn" id="btn-a3" data-format="A3">A3</button>
        </div>
        <button class="btn btn-export" id="btn-png">[ export PNG ]</button>
        <button class="btn btn-export" id="btn-pdf">[ export PDF ]</button>
      </div>
    </aside>

    <!-- CANVAS AREA -->
    <main class="canvas-area">
      <div class="canvas-wrapper" id="canvas-wrapper">
        <!-- p5.js canvas injected here -->
      </div>
    </main>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
